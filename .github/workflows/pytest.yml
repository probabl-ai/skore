name: pytest

# **How it works**
# ================
#
# The workflow runs `pytest` jobs on all the repository packages, identified by the JSON
# list `env.PACKAGES`. If you want to run this workflow on a new package, you only have
# to add its name in the above list, and in the `pr-display-code-coverage.yml` workflow.
#
# It's important to notice that only one workflow is triggered for all packages.
#
# The workflow is triggered on:
# - __pull_request__ or __merge_group__ event (A),
# - __push__ event on the main branch (B).
#
# On (A), the workflow is started and runs jobs on modified packages, and only on modified
# packages.
#
# On (B), the workflow is started and runs jobs on all packages, no matter if they have
# modification.
#
# Environments are managed by `pixi` (see `pixi.toml` at the repo root). The matrix below
# enumerates the supported `(os, pixi environment)` pairs directly; keep this list in sync
# with the `[environments]` table in `pixi.toml`.

on:
  pull_request:
  push:
    branches:
      - main
  merge_group:
    types: [checks_requested]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

defaults:
  run:
    shell: bash

env:
  PACKAGES: '["skore"]'
  PIXI_VERSION: v0.69.0

jobs:
  pytest-changes:
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.setup.outputs.packages }}
      modified-packages: ${{ steps.filter.outputs.changes }}
    permissions:
      pull-requests: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create dynamically filtering file, based on `env.PACKAGES`
        id: setup
        run: |
          set -eu
          echo "packages=${PACKAGES}" >> $GITHUB_OUTPUT
          echo "${PACKAGES}" | jq -r '.[]' | while read package; do
              >>${FILEPATH} echo "${package}:
              - '.github/workflows/pytest.yml'
              - 'pixi.toml'
              - 'pixi.lock'
              - '${package}/**'"
          done
        env:
          FILEPATH: ${{ runner.temp }}/filters.yaml

      - name: Define if at least one file has changed
        id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: ${{ runner.temp }}/filters.yaml

  pytest-test:
    needs: [pytest-changes]
    if: ${{ (github.event_name == 'push') || (needs.pytest-changes.outputs.modified-packages != '[]') }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        environment:
          - py311-sklearn15
          - py311-sklearn15-mlflow2
          - py311-sklearn18
          - py312-sklearn15
          - py312-sklearn18
          - py313-sklearn15
          - py313-sklearn18
          - py314-sklearn17
          - py314-sklearn18
          - py314-sklearn18-pandas2
          - py314-sklearn18-mlflow3
        exclude:
          - os: windows-latest
            environment: py314-sklearn18-pandas2
        include:
          - os: ubuntu-latest
            environment: py314-sklearn18
            coverage: true
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pixi
        uses: prefix-dev/setup-pixi@5185adfbffb4bd703da3010310260805d89ebb11 # v0.9.6
        with:
          pixi-version: ${{ env.PIXI_VERSION }}
          environments: ${{ matrix.environment }}
          cache: true
          locked: true

      - name: Test without coverage
        if: ${{ ! matrix.coverage }}
        timeout-minutes: 20
        working-directory: skore/
        run: pixi run -e ${{ matrix.environment }} --manifest-path ../pixi.toml pytest src/ tests/ --no-cov

      - name: Test with coverage
        if: ${{ matrix.coverage }}
        timeout-minutes: 20
        working-directory: skore/
        run: |
          mkdir coverage
          pixi run -e ${{ matrix.environment }} --manifest-path ../pixi.toml \
              pytest src/ tests/ \
              --junitxml=coverage/pytest.xml \
              --cov-config=pyproject.toml \
              --cov-report=xml:coverage/pytest-coverage.xml \
              --cov

      - name: Upload coverage reports
        if: ${{ matrix.coverage && (github.event_name == 'pull_request') }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: skore-coverage
          path: skore/coverage/

  pytest:
    needs:
      - pytest-changes
      - pytest-test
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - run: |
          [[  ${{ contains(needs.*.result, 'failure') }} = false ]]
