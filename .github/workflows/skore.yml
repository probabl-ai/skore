name: Reusable skore workflow

on: [workflow_call]

defaults:
  run:
    shell: "bash"

jobs:
  test-skore:
    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu-latest"] # , "windows-latest"]
        python: ["3.12"] # "3.9", "3.10", "3.11", "3.12"]
        scikit-learn: ["1.6"]
        # include:
        #   - os: "ubuntu-latest"
        #     python: "3.12"
        #     scikit-learn: "1.3"
        #   - os: "ubuntu-latest"
        #     python: "3.12"
        #     scikit-learn: "1.4"
        #   - os: "ubuntu-latest"
        #     python: "3.12"
        #     scikit-learn: "1.5"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: 'skore/venv'
          key: python-venv-${{ matrix.os }}-${{ matrix.python }}-${{ matrix.scikit-learn }}-${{ hashFiles('skore/pyproject.toml') }}
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: "pip"
      - name:
        timeout-minutes: 10
        working-directory: "skore/"
        run: |
          set -eu

          # Initialize python-venv
          python -m venv venv

          if [[ "${{ matrix.os }}" == "ubuntu-latest" ]]; then
              source venv/bin/activate
          else
              venv/Scripts/activate
          fi

          # Install dependencies
          python -m pip install --upgrade "pip"
          python -m pip install --upgrade "pre-commit"
          python -m pip install --upgrade "build"
          python -m pip install --upgrade "scikit-learn ==${{ matrix.scikit-learn }}"

          # Lint
          pre-commit run --all-files ruff

          # Build
          python -m build

          # Install
          wheel=(dist/*.whl); python -m pip install --upgrade "${wheel}[test]"

          # Test
          python -m pytest --no-cov src/ tests/
